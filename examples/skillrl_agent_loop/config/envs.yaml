alfworld:
  alfworld_config_path: ${oc.env:SKILLRL_ROOT}/agent_system/environments/env_package/alfworld/configs/config_tw.yaml
  eval_dataset: ${oc.env:SKILLRL_ALFWORLD_EVAL_DATASET,eval_out_of_distribution}
  max_steps: ${oc.env:SKILLRL_ALFWORLD_MAX_STEPS,50}
  skill_json_path: ${oc.env:SKILLRL_ALFWORLD_SKILL_JSON_PATH,null}
  skill_top_k: ${oc.env:SKILLRL_ALFWORLD_SKILL_TOP_K,6}
  task_specific_top_k: ${oc.env:SKILLRL_ALFWORLD_TASK_SPECIFIC_TOP_K,null}
  mistakes_top_k: ${oc.env:SKILLRL_ALFWORLD_MISTAKES_TOP_K,5}
  inject_skills_on_init: ${oc.env:SKILLRL_ALFWORLD_INJECT_SKILLS,false}

webshop:
  webshop_root: ${oc.env:SKILLRL_ROOT}/agent_system/environments/env_package/webshop/webshop
  max_steps: ${oc.env:SKILLRL_WEBSHOP_MAX_STEPS,15}
  skill_json_path: ${oc.env:SKILLRL_WEBSHOP_SKILL_JSON_PATH,null}
  skill_top_k: ${oc.env:SKILLRL_WEBSHOP_SKILL_TOP_K,6}
  task_specific_top_k: ${oc.env:SKILLRL_WEBSHOP_TASK_SPECIFIC_TOP_K,null}
  mistakes_top_k: ${oc.env:SKILLRL_WEBSHOP_MISTAKES_TOP_K,5}
  inject_skills_on_init: ${oc.env:SKILLRL_WEBSHOP_INJECT_SKILLS,false}
  webshop_env_kwargs:
    observation_mode: text
    file_path: ${oc.env:WEBSHOP_FILE_PATH,/mnt/data/xts/data/webshop/data/items_shuffle_1000.json}
    attr_path: ${oc.env:WEBSHOP_ATTR_PATH,/mnt/data/xts/data/webshop/data/items_ins_v2_1000.json}
    num_products: null
    num_prev_actions: 1
