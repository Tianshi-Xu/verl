tools:
  - class_name: recipe.skillrl_agent_loop.env_action_tool.SearchActionTool
    config:
      type: native
    tool_schema:
      type: function
      function:
        name: search_action
        description: Search the WebShop site with keywords.
        parameters:
          type: object
          properties:
            keywords:
              type: string
              description: Search keywords.
          required: [keywords]
  - class_name: recipe.skillrl_agent_loop.env_action_tool.ClickActionTool
    config:
      type: native
    tool_schema:
      type: function
      function:
        name: click_action
        description: Click one available WebShop action.
        parameters:
          type: object
          properties:
            value:
              type: string
              description: The clickable value to click.
          required: [value]

